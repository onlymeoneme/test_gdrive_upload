name: Sync Proxies to Google Drive

on:
  schedule:
    # Запуск каждые 3 часа (00:00, 03:00, 06:00 и т.д.)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Позволяет запускать скрипт вручную в любое время
  push:
    branches:
      - main # Триггер при пуше в ветку main (удобно для тестов)

jobs:
  sync-job:
    runs-on: ubuntu-latest

    steps:
    # 1. Выкачиваем код вашего репозитория
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Разворачиваем окружение Python (без принудительного кэша)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # 3. Устанавливаем необходимые библиотеки
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-auth google-api-python-client requests

    # 4. Запускаем скрипт синхронизации
    - name: Run sync script
      env:
        GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
      run: python sync.py
